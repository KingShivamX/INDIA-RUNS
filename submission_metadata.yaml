# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"
ai_usage_summary: |
  Used Gemini 3.5 Flash (High) via Antigravity to analyze candidate profiles, identify honeypots, refine the rule-based candidate scoring pipeline, and generate the final ranking script. No external API calls are made during the ranking execution.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Highly optimized rule-based scoring engine designed specifically for the Senior AI Engineer JD constraints. We implement complete honeypot detection (temporal start date vs founding year checks, company duration limits, and zero-duration skill checks) guaranteeing a 0% honeypot rate. Candidates are disqualified based on consulting-only history, research-only history, architect-only profiles, and CV/speech-only domain mismatches. Scored on Title, Experience, Product company history, Skills (must-have groups and nice-to-have bonuses), Location, and Notice Period, modified by a multi-factor Behavioral Signal modifier. Ranks are deterministic with sorted rounded scores and ascending ID tie-breakers. Executes in ~4 seconds on CPU with 0 network calls.

