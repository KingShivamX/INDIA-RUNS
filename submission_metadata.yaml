# ═══════════════════════════════════════════════════════════════════════════
# AI Tools Declaration
# ═══════════════════════════════════════════════════════════════════════════
ai_tools_used:
  - "Gemini 3.5 Flash"
  - "Claude Opus 4.6"
ai_usage_summary: |
  Used Gemini and Claude via Antigravity IDE to analyze the 100K candidate
  dataset, identify honeypot patterns, design the multi-axis scoring system,
  and generate the final ranking pipeline. No external API calls are made
  during ranking execution — the script runs fully offline.

# ═══════════════════════════════════════════════════════════════════════════
# Approach Summary
# ═══════════════════════════════════════════════════════════════════════════
methodology_summary: |
  High-performance, fully-offline AI resume ranking engine with:

  FILTERING:
  • 3-layer honeypot detection (temporal start dates, impossible tenures, zero-duration expert skills)
  • 6-rule disqualification filter (consulting-only, research-only, domain mismatch, unrelated titles)

  SCORING (10 weighted axes):
  • Title match (25%), Skills match (15%), Experience fit (12%), Product company ratio (12%)
  • TF-IDF JD similarity (8%), Location & notice (10%), Education tier (5%)
  • Career trajectory (5%), Job stability (5%), AI/ML domain depth (3%)

  BEHAVIORAL MULTIPLIER (0.5x–1.4x):
  • 10 platform signals: recruiter response rate, activity recency, open-to-work flag,
    interview completion, GitHub activity, offer acceptance, recruiter saves,
    profile completeness, email/phone/LinkedIn verification

  PERFORMANCE:
  • Processes 100K profiles in ~16 seconds on a single CPU core
  • Zero network calls, zero GPU, zero pre-computation

